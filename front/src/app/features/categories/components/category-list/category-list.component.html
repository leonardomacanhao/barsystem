<app-page-header 
  title="Categorias"
  subtitle="Organize seus produtos em categorias"
  actionUrl="/categories/new"
  actionLabel="Nova Categoria">
</app-page-header>

<app-card>
  <div class="table-container" *ngIf="categories.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Status</th>
          <th class="actions-column">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories" class="table-row">
          <td>
            <div class="category-name">
              <div class="category-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
              </div>
              <span>{{ category.name }}</span>
            </div>
          </td>
          <td>
            <span class="description">{{ category.description || '—' }}</span>
          </td>
          <td>
            <span class="status-badge" [class.active]="category.isActive" [class.inactive]="!category.isActive">
              <span class="status-dot"></span>
              {{ category.isActive ? 'Ativo' : 'Inativo' }}
            </span>
          </td>
          <td class="actions-column">
            <div class="action-buttons">
              <button 
                class="icon-btn edit" 
                [routerLink]="['/categories/edit', category.id]"
                title="Editar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button 
                class="icon-btn delete" 
                (click)="delete(category.id)"
                title="Excluir">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-empty-state 
    *ngIf="categories.length === 0"
    title="Nenhuma categoria cadastrada"
    description="Comece criando sua primeira categoria para organizar seus produtos"
    actionUrl="/categories/new"
    actionLabel="Criar Categoria">
    <svg icon width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </app-empty-state>
</app-card>
