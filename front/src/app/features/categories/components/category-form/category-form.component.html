<app-page-header 
  [title]="isEdit ? 'Editar Categoria' : 'Nova Categoria'"
  [subtitle]="isEdit ? 'Atualize os dados da categoria' : 'Crie uma nova categoria para organizar seus produtos'"
  actionUrl="/categories"
  actionLabel="Voltar">
</app-page-header>

<app-card>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-grid">
      <div class="form-group full-width">
        <label for="name">Nome da Categoria <span class="required">*</span></label>
        <input 
          type="text" 
          id="name"
          formControlName="name" 
          placeholder="Ex: Bebidas, Petiscos, Sobremesas..."
          [class.invalid]="form.get('name')?.touched && form.get('name')?.invalid"
          autocomplete="off">
        <div class="error" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
          <small>Nome é obrigatório</small>
        </div>
      </div>

      <div class="form-group full-width">
        <label for="description">Descrição</label>
        <textarea 
          id="description"
          formControlName="description" 
          rows="4"
          placeholder="Descreva brevemente o que esta categoria representa..."
          class="textarea"></textarea>
        <div class="helper-text">
          {{ form.get('description')?.value?.length || 0 }} / 500 caracteres
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button 
        type="button" 
        class="btn-secondary" 
        routerLink="/categories">
        Cancelar
      </button>
      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="loading || form.invalid">
        <span *ngIf="!loading">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ isEdit ? 'Salvar Alterações' : 'Criar Categoria' }}
        </span>
        <span *ngIf="loading" class="loading">
          <svg class="spinner" width="16" height="16" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity="0.25"/>
            <path d="M12 2C6.48 2 2 6.48 2 12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
          Salvando...
        </span>
      </button>
    </div>
  </form>
</app-card>
