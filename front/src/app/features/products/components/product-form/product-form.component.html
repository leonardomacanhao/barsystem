<app-page-header 
  [title]="isEdit ? 'Editar Produto' : 'Novo Produto'"
  [subtitle]="isEdit ? 'Atualize os dados do produto' : 'Cadastre um novo item no cardápio'"
  actionUrl="/products"
  actionLabel="Voltar"
  actionType="back">
</app-page-header>

<app-card>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-grid">
      <div class="form-row">
        <div class="form-group" style="flex: 2;">
          <label for="name">Nome do Produto <span class="required">*</span></label>
          <input 
            type="text" 
            id="name"
            formControlName="name" 
            placeholder="Ex: Cerveja Artesanal 600ml"
            [class.invalid]="form.get('name')?.touched && form.get('name')?.invalid"
            autocomplete="off">
          <div class="error" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
            <small>Nome é obrigatório</small>
          </div>
        </div>

        <div class="form-group" style="flex: 1;">
          <label for="price">Preço <span class="required">*</span></label>
          <div class="price-input-group">
            <span class="price-addon">R$</span>
            <input 
              type="text" 
              id="price"
              formControlName="price"
              (input)="onPriceInput($event)"
              (blur)="onPriceBlur()"
              placeholder="0,00"
              [class.invalid]="form.get('price')?.touched && form.get('price')?.invalid"
              class="price-field"
              inputmode="decimal"
              autocomplete="off">
          </div>
          <div class="error" *ngIf="form.get('price')?.touched && form.get('price')?.invalid">
            <small>Preço deve ser maior que zero</small>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="categoryId">Categoria <span class="required">*</span></label>
        <select 
          id="categoryId"
          formControlName="categoryId"
          [class.invalid]="form.get('categoryId')?.touched && form.get('categoryId')?.invalid">
          <option value="">Selecione uma categoria</option>
          <option *ngFor="let category of categories" [value]="category.id">
            {{ category.name }}
          </option>
        </select>
        <div class="error" *ngIf="form.get('categoryId')?.touched && form.get('categoryId')?.invalid">
          <small>Categoria é obrigatória</small>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Descrição</label>
        <textarea 
          id="description"
          formControlName="description" 
          rows="3"
          placeholder="Descreva brevemente o produto..."
          class="textarea"></textarea>
      </div>

      <div class="form-group">
        <label>Imagem do Produto</label>
        <div class="image-upload-area" [class.has-image]="imagePreview || form.get('imageUrl')?.value">
          <img 
            *ngIf="imagePreview || form.get('imageUrl')?.value" 
            [src]="getImageUrl()" 
            class="image-preview"
            alt="Preview">
          
          <label class="upload-label" *ngIf="!imagePreview && !form.get('imageUrl')?.value">
            <input 
              type="file" 
              (change)="onFileSelected($event)" 
              accept="image/*"
              class="file-input">
            <div class="upload-placeholder">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>Clique para enviar uma imagem</span>
              <small>JPG, PNG até 2MB</small>
            </div>
          </label>

          <button 
            type="button" 
            class="change-image-btn" 
            *ngIf="imagePreview || form.get('imageUrl')?.value"
            (click)="fileInput.click()">
            Alterar imagem
          </button>
          <input 
            #fileInput
            type="file" 
            (change)="onFileSelected($event)" 
            accept="image/*"
            style="display: none;">
        </div>
      </div>

      <div class="status-section">
        <div class="section-divider"></div>
        <div class="toggle-container">
          <label class="toggle-label">
            <input 
              type="checkbox" 
              formControlName="isActive"
              class="toggle-input">
            <span class="toggle-switch"></span>
            <span class="toggle-text">
              <span class="toggle-title">Produto Ativo</span>
              <span class="toggle-description">Produtos inativos não aparecem no cardápio</span>
            </span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button 
        type="button" 
        class="btn-secondary" 
        routerLink="/products">
        Cancelar
      </button>
      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="loading || form.invalid || uploading">
        <span *ngIf="!loading && !uploading">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ isEdit ? 'Salvar Alterações' : 'Criar Produto' }}
        </span>
        <span *ngIf="uploading" class="loading">
          <svg class="spinner" width="16" height="16" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity="0.25"/>
            <path d="M12 2C6.48 2 2 6.48 2 12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
          Enviando imagem...
        </span>
        <span *ngIf="loading && !uploading" class="loading">
          <svg class="spinner" width="16" height="16" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity="0.25"/>
            <path d="M12 2C6.48 2 2 6.48 2 12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
          Salvando...
        </span>
      </button>
    </div>
  </form>
</app-card>
