<div *ngIf="authService.isLoggedIn(); else loginTemplate" class="app-container">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 22h8M7 10h10M12 15v7M12 15a5 5 0 005-5c0-2-2-2-2-4V4a2 2 0 00-2-2H11a2 2 0 00-2 2v2c0 2-2 2-2 4a5 5 0 005 5z"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">BarSystem</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-title">Principal</span>
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Cardapio</span>
        <a routerLink="/categories" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          </svg>
          <span>Categorias</span>
        </a>
        <a routerLink="/products" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span>Produtos</span>
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Operacao</span>
        <a routerLink="/tables" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 9h20M4 9v10a2 2 0 002 2h12a2 2 0 002-2V9M7 9V5a2 2 0 012-2h6a2 2 0 012 2v4"/>
          </svg>
          <span>Mesas</span>
        </a>
        <a routerLink="/accounts" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <span>Conta Corrente</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="authService.hasRole('Admin')">
        <span class="nav-section-title">Administracao</span>
        <a routerLink="/users" routerLinkActive="active" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Usuarios</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">
          <span>{{ authService.getCurrentUser()?.name?.charAt(0) || 'U' }}</span>
        </div>
        <div class="user-details">
          <span class="user-name">{{ authService.getCurrentUser()?.name }}</span>
          <span class="user-role">{{ authService.getCurrentUser()?.role }}</span>
        </div>
      </div>
      <button (click)="logout()" class="btn-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
<ng-template #loginTemplate>
  <router-outlet></router-outlet>
</ng-template>
